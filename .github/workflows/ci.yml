name: "Win ci"

on:
  push:
    paths-ignore:
      - "README.md"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "README.md"
      - "LICENSE"

permissions:
  contents: read

jobs:
  windows-build:
    name: Windows build (${{ matrix.features }})
    runs-on: windows-latest
    strategy:
      matrix:
        features: [default, no-ui]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.features }}

      - name: Build release binary
        run: |
          if ("${{ matrix.features }}" -eq "no-ui") {
            cargo build --release --no-default-features --features "vigem,vjoy,ws,bluetooth"
          } else {
            cargo build --release
          }
