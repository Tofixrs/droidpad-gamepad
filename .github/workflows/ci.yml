name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  windows-build:
    name: Windows build (${{ matrix.features }})
    runs-on: windows-latest
    strategy:
      matrix:
        features: [default, no-ui]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.features }}

      - name: Build release binary
        run: |
          if ("${{ matrix.features }}" -eq "no-ui") {
            cargo build --release --no-default-features --features "vigem,vjoy,ws,bluetooth"
          } else {
            cargo build --release
          }

  linux-build:
    name: Linux build (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features: [default, no-ui]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libevdev-dev libxkbcommon-dev libdbus-1-dev libxcb1-dev libwayland-dev libvulkan-dev libayatana-appindicator3-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.features }}

      - name: Build release binary
        run: |
          if [ "${{ matrix.features }}" = "no-ui" ]; then
            cargo build --release --no-default-features --features "ws,bluetooth"
          else
            cargo build --release
          fi

  nix-flake-build:
    name: Nix flake build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build flake package
        run: nix build .#default
