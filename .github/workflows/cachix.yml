name: "Nix ci"
on:
  push:
    branches:
      - master
    paths-ignore:
      - "README.md"
      - "LICENSE"
jobs:
  update-cachix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            log-lines = 0
      - uses: cachix/cachix-action@v17
        with:
          name: tofix-cache
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: |
          nix build "path:.#ui" --print-build-logs
          nix build "path:.#cli" --print-build-logs
